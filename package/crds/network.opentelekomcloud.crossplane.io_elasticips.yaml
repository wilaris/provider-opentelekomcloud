                - message: publicIp.name is immutable after creation
                  rule: '!has(oldSelf.publicIp.name) || self.publicIp.name == oldSelf.publicIp.name'
                - message: bandwidth.shareType is immutable after creation
                  rule: self.bandwidth.shareType == oldSelf.bandwidth.shareType
                - message: bandwidth.chargeMode is immutable after creation
                  rule: '!has(oldSelf.bandwidth.chargeMode) || self.bandwidth.chargeMode
