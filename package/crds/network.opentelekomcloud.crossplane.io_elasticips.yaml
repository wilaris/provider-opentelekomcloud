            properties:
              atProvider:
                description: ElasticIPObservation are the observable fields of an
                  ElasticIP.
                properties:
                  bandwidthChargeMode:
                    description: BandwidthChargeMode is the observed bandwidth charge
                      mode.
                    type: string
                  bandwidthId:
                    description: BandwidthID is the associated bandwidth ID.
                    type: string
                  bandwidthName:
                    description: BandwidthName is the observed bandwidth name.
                    type: string
                  bandwidthShareType:
                    description: BandwidthShareType is the observed bandwidth sharing
                      type.
                    type: string
                  bandwidthSize:
                    description: BandwidthSize is the observed bandwidth size in Mbps.
                    type: integer
                  id:
                    description: ID is the OTC EIP ID.
                    type: string
                  ipVersion:
                    description: IPVersion is the observed IP version (4 or 6).
                    type: integer
                  portId:
                    description: PortID is the currently bound port ID.
                    type: string
                  privateIpAddress:
                    description: PrivateIPAddress is the private IP address if bound
                      to a port.
                    type: string
                  publicIpAddress:
                    description: PublicIPAddress is the allocated public IP address.
                    type: string
                  status:
                    description: Status is the observed EIP status.
                    type: string
                  tags:
                    additionalProperties:
                      type: string
                    description: Tags are observed EIP tags.
                    type: object
                type: object
              conditions:
                description: Conditions of the resource.
                items:
                  description: A Condition that may apply to a resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        LastTransitionTime is the last time this condition transitioned from one
                        status to another.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        A Message containing details about this condition's last transition from
                        one status to another, if any.
                      type: string
                    observedGeneration:
                      description: |-
                        ObservedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      type: integer
                    reason:
                      description: A Reason for this condition's last transition from
                        one status to another.
                      type: string
                    status:
                      description: Status of this condition; is it currently True,
                        False, or Unknown?
                      type: string
                    type:
                      description: |-
                        Type of this condition. At most one of each condition type may apply to
                        a resource at any point in time.
                      type: string
