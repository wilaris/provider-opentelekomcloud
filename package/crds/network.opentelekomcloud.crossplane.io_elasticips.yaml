    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: An ElasticIP is a managed resource that represents an OpenTelekomCloud
          VPC Elastic IP.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: An ElasticIPSpec defines the desired state of an ElasticIP.
            properties:
              forProvider:
                description: ElasticIPParameters are the configurable fields of an
                  ElasticIP.
                properties:
                  bandwidth:
                    description: Bandwidth defines the bandwidth configuration.
                    properties:
                      chargeMode:
                        description: ChargeMode is the bandwidth charge mode.
                        type: string
                      name:
                        description: Name is the bandwidth name.
                        maxLength: 64
                        minLength: 1
                        type: string
                      shareType:
                        description: |-
                          ShareType is the bandwidth sharing type.
                          Dedicated allocates bandwidth exclusively for this EIP.
                        enum:
                        - Dedicated
                        type: string
                      size:
                        description: Size is the bandwidth size in Mbps.
                        minimum: 1
                        type: integer
                    required:
                    - name
                    - shareType
                    - size
                    type: object
                  publicIp:
                    description: PublicIP defines the public IP configuration.
                    properties:
                      ipAddress:
                        description: IPAddress is the specific IP address to request.
                        type: string
                      name:
                        description: Name is the alias of the public IP.
                        maxLength: 64
                        type: string
                      portId:
                        description: PortID is the port to bind the EIP to.
                        type: string
                      type:
                        description: |-
                          Type is the public IP type.
                          BGP corresponds to the OTC "5_bgp" dynamic BGP type.
                        enum:
                        - BGP
                        type: string
                    required:
                    - type
                    type: object
                  tags:
