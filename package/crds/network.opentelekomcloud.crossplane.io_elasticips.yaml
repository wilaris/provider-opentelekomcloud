    - crossplane
    - managed
    - opentelekomcloud
    kind: ElasticIP
    listKind: ElasticIPList
    plural: elasticips
    singular: elasticip
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
