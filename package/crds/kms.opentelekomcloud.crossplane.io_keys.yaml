---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: keys.kms.opentelekomcloud.crossplane.io
spec:
  group: kms.opentelekomcloud.crossplane.io
  names:
    categories:
    - crossplane
    - managed
    - opentelekomcloud
    kind: Key
    listKind: KeyList
    plural: keys
    singular: key
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: READY
      type: string
    - jsonPath: .status.conditions[?(@.type=='Synced')].status
      name: SYNCED
      type: string
    - jsonPath: .metadata.annotations.crossplane\.io/external-name
      name: EXTERNAL-NAME
      type: string
    - jsonPath: .spec.forProvider.keyAlias
      name: ALIAS
      type: string
    - jsonPath: .status.atProvider.keyState
      name: STATE
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: A Key is a managed resource that represents an OpenTelekomCloud
          KMS Customer Master Key.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: A KeySpec defines the desired state of a Key.
            properties:
              forProvider:
                description: KeyParameters are the configurable fields of a KMS Customer
                  Master Key (CMK).
                properties:
                  description:
                    description: Description is the CMK description.
                    maxLength: 255
                    type: string
                  enabled:
                    default: true
                    description: |-
                      Enabled is the desired enabled state of the CMK. Defaults to true.
                      Toggling this field issues an EnableKey or DisableKey call on the next reconcile.
                    type: boolean
                  keyAlias:
                    description: KeyAlias is the human-readable alias of the CMK.
                    maxLength: 255
                    minLength: 1
                    type: string
                  keyUsage:
                    default: EncryptAndDecrypt
                    description: |-
                      KeyUsage is the cryptographic purpose of the CMK. Defaults to "EncryptAndDecrypt".
                      This is an OTC API create-time option and is intentionally immutable after creation.
                      The Terraform KMS key resource used as reference does not expose this field.
                    enum:
                    - EncryptAndDecrypt
                    - SignAndVerify
                    type: string
                  pendingDays:
                    default: "7"
                    description: |-
                      PendingDays is the number of days the CMK stays in PendingDeletion before
                      being permanently destroyed. Used only at delete time. Range 7..1096; default "7".
                    pattern: ^([7-9]|[1-9][0-9]|[1-9][0-9]{2}|10[0-8][0-9]|109[0-6])$
                    type: string
                  realm:
                    description: |-
                      Realm is the OTC region/realm in which the CMK material lives.
                      Optional and immutable after creation; the API may default and report the value back.
                    type: string
                  rotationEnabled:
                    description: |-
                      RotationEnabled specifies whether key rotation is enabled for normal KMS-origin CMKs.
                      Imported/external key material does not support rotation.
                    type: boolean
                  rotationInterval:
                    description: |-
                      RotationInterval is the interval (in days) at which the key is rotated.
                      It is valid only when RotationEnabled is true.
                    maximum: 365
                    minimum: 30
                    type: integer
                  tags:
                    additionalProperties:
                      type: string
                    description: Tags are CMK tags managed via the OTC tag service.
                    maxProperties: 20
                    type: object
                required:
                - keyAlias
                type: object
                x-kubernetes-validations:
                - message: realm is immutable after creation
                  rule: '!has(oldSelf.realm) || (has(self.realm) && self.realm ==
                    oldSelf.realm)'
                - message: keyUsage is immutable after creation
                  rule: '!has(oldSelf.keyUsage) || (has(self.keyUsage) && self.keyUsage
                    == oldSelf.keyUsage)'
                - message: rotationInterval can only be set when rotationEnabled is
                    true
                  rule: '!has(self.rotationInterval) || (has(self.rotationEnabled)
                    && self.rotationEnabled == true)'
              managementPolicies:
                default:
                - '*'
                description: |-
                  THIS IS A BETA FIELD. It is on by default but can be opted out
                  through a Crossplane feature flag.
                  ManagementPolicies specify the array of actions Crossplane is allowed to
                  take on the managed and external resources.
                  See the design doc for more information: https://github.com/crossplane/crossplane/blob/499895a25d1a1a0ba1604944ef98ac7a1a71f197/design/design-doc-observe-only-resources.md?plain=1#L223
                  and this one: https://github.com/crossplane/crossplane/blob/444267e84783136daa93568b364a5f01228cacbe/design/one-pager-ignore-changes.md
                items:
                  description: |-
                    A ManagementAction represents an action that the Crossplane controllers
                    can take on an external resource.
                  enum:
                  - Observe
                  - Create
                  - Update
                  - Delete
                  - LateInitialize
                  - '*'
                  type: string
                type: array
              providerConfigRef:
                default:
                  kind: ClusterProviderConfig
                  name: default
                description: |-
                  ProviderConfigReference specifies how the provider that will be used to
                  create, observe, update, and delete this managed resource should be
                  configured.
                properties:
                  kind:
                    description: Kind of the referenced object.
                    type: string
                  name:
                    description: Name of the referenced object.
                    type: string
                required:
                - kind
                - name
                type: object
              writeConnectionSecretToRef:
                description: |-
                  WriteConnectionSecretToReference specifies the namespace and name of a
                  Secret to which any connection details for this managed resource should
                  be written. Connection details frequently include the endpoint, username,
                  and password required to connect to the managed resource.
                properties:
                  name:
                    description: Name of the secret.
                    type: string
                required:
                - name
                type: object
            required:
            - forProvider
            type: object
          status:
            description: A KeyStatus represents the observed state of a Key.
            properties:
              atProvider:
                description: |-
                  KeyObservation are the observable fields of a KMS CMK.

                  Note(): Terraform computed-only fields creation_date, default_key_flag and
                  origin are intentionally not surfaced. Any key created through this controller
                  is a user-managed KMS-origin CMK. Terraform's allow_cancel_deletion recovery
                  toggle is also omitted; a remotely PendingDeletion key is treated as deleted.
                properties:
                  description:
                    description: Description is the observed CMK description.
                    type: string
                  domainId:
                    description: DomainID is the user domain that owns this CMK.
                    type: string
                  expirationTime:
                    description: ExpirationTime is set for keys with imported material
                      that have an expiration.
                    type: string
                  keyAlias:
                    description: KeyAlias is the observed CMK alias.
                    type: string
                  keyId:
                    description: KeyID is the OTC-assigned CMK identifier.
                    type: string
                  keyState:
                    description: |-
                      KeyState reflects the OTC CMK lifecycle state.
                      One of:
                      - "WaitingForEnable"
                      - "Enabled"
                      - "Disabled"
                      - "PendingDeletion"
                      - "WaitingForImport"
                      Unknown values returned by future OTC API revisions pass through verbatim.
                    type: string
                  realm:
                    description: Realm is the observed realm.
                    type: string
                  rotationEnabled:
                    description: RotationEnabled is the observed key rotation setting.
                    type: boolean
                  rotationInterval:
                    description: RotationInterval is the observed key rotation interval
                      in days.
                    type: integer
                  rotations:
                    description: Rotations is the observed number of times the key
                      has been rotated.
                    type: integer
                  scheduledDeletionDate:
                    description: ScheduledDeletionDate is populated once a key is
                      scheduled for deletion.
                    type: string
                  tags:
                    additionalProperties:
                      type: string
                    description: Tags are observed CMK tags.
                    type: object
                type: object
              conditions:
                description: Conditions of the resource.
                items:
                  description: A Condition that may apply to a resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        LastTransitionTime is the last time this condition transitioned from one
                        status to another.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        A Message containing details about this condition's last transition from
                        one status to another, if any.
                      type: string
                    observedGeneration:
                      description: |-
                        ObservedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      type: integer
                    reason:
                      description: A Reason for this condition's last transition from
                        one status to another.
                      type: string
                    status:
                      description: Status of this condition; is it currently True,
                        False, or Unknown?
                      type: string
                    type:
                      description: |-
                        Type of this condition. At most one of each condition type may apply to
                        a resource at any point in time.
                      type: string
                  required:
                  - lastTransitionTime
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: |-
                  ObservedGeneration is the latest metadata.generation
                  which resulted in either a ready state, or stalled due to error
                  it can not recover from without human intervention.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
