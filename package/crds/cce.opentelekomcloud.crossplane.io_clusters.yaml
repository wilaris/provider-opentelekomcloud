                - message: eniSubnetId and eniSubnetCidr must be set together
                  rule: has(self.eniSubnetId) == has(self.eniSubnetCidr)
                - message: authenticatingProxy must be set when authenticationMode
                    is 'authenticating_proxy'
                  rule: '!(has(self.authenticationMode) && self.authenticationMode
                    == ''authenticating_proxy'') || has(self.authenticatingProxy)'
                - message: masters and multiAz are mutually exclusive
                  rule: '!(has(self.masters) && has(self.multiAz) && self.multiAz)'
                - message: customSan is immutable after creation (the CCE API has
                    no update path)
                  rule: oldSelf.customSan == null || self.customSan == oldSelf.customSan
                - message: deleteAllStorage cannot be combined with deleteEfs, deleteEvs,
                    deleteObs or deleteSfs
                  rule: '!has(self.deleteAllStorage) || (!has(self.deleteEfs) && !has(self.deleteEvs)
                    && !has(self.deleteObs) && !has(self.deleteSfs))'
                - message: deleteAllNetwork cannot be combined with deleteEni or deleteNet
                  rule: '!has(self.deleteAllNetwork) || (!has(self.deleteEni) && !has(self.deleteNet))'
              managementPolicies:
