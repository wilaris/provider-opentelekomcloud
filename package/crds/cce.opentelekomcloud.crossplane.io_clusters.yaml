          status:
            description: A ClusterStatus represents the observed state of a Cluster.
            properties:
              atProvider:
                description: ClusterObservation are the observable fields of a CCE
                  Cluster.
                properties:
                  externalEndpoint:
                    description: ExternalEndpoint is the external API endpoint of
